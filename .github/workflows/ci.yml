name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, lab4-ci-cd-security]
  pull_request:
    branches: [main, develop, lab4-ci-cd-security]
  workflow_dispatch:

jobs:
  backend-test:
    name: Backend - Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./server
        run: pnpm install

      - name: Run lint
        working-directory: ./server
        run: pnpm lint

      - name: Run migration
        working-directory: ./server
        run: pnpm typeorm:migrate
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: test_db

      - name: Run tests with coverage
        working-directory: ./server
        run: pnpm test:cov:ci
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: test_db

      - name: Run E2E tests
        working-directory: ./server
        run: pnpm test:e2e
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: test_db

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: server/coverage
          if-no-files-found: warn

      - name: Telegram notify
        if: always()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Job: backend-test
            Status: ${{ job.status }}
            Ref: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

  backend-build:
    name: Backend - Build
    needs: backend-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./server
        run: pnpm install

      - name: Build project
        working-directory: ./server
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: server/dist
          if-no-files-found: error

      - name: Telegram notify
        if: always()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Job: backend-build
            Status: ${{ job.status }}
            Ref: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

  frontend-test:
    name: Frontend - Test
    needs: backend-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Run lint
        working-directory: ./client
        run: npm run lint

      - name: Type check
        working-directory: ./client
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: ./client
        run: npm run test:ci

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: client/coverage
          if-no-files-found: warn

      - name: Telegram notify
        if: always()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Job: frontend-test
            Status: ${{ job.status }}
            Ref: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

  sonarqube:
    name: SonarQube - Scan & Quality Gate
    needs: frontend-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: server/coverage

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: client/coverage

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Sonar Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Telegram notify
        if: always()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Job: sonarqube
            Status: ${{ job.status }}
            Ref: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

  frontend-build:
    name: Frontend - Build
    needs: sonarqube
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Build project
        working-directory: ./client
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Telegram notify
        if: always()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Job: frontend-build
            Status: ${{ job.status }}
            Ref: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

  build-and-push-backend:
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            jenya00/crm_vontamona-backend:latest
            jenya00/crm_vontamona-backend:${{ github.sha }}

      - name: Telegram notify
        if: always()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Job: push-backend
            Status: ${{ job.status }}
            Image: jenya00/crm_vontamona-backend:${{ github.sha }}

  build-and-push-frontend:
    runs-on: ubuntu-latest
    needs: build-and-push-backend
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            jenya00/crm_vontamona-frontend:latest
            jenya00/crm_vontamona-frontend:${{ github.sha }}

      - name: Telegram notify
        if: always()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Job: push-frontend
            Status: ${{ job.status }}
            Image: jenya00/crm_vontamona-frontend:${{ github.sha }}

  update-k8s-manifests:
    name: Update K8s manifests (image tags)
    runs-on: ubuntu-latest
    needs: [build-and-push-backend, build-and-push-frontend]
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update image tags in k3s manifests
        run: |
          set -euo pipefail
          sed -i "s#jenya00/crm_vontamona-backend:.*#jenya00/crm_vontamona-backend:${GITHUB_SHA}#" infrastructure/k3s/backend.yaml
          sed -i "s#jenya00/crm_vontamona-frontend:.*#jenya00/crm_vontamona-frontend:${GITHUB_SHA}#" infrastructure/k3s/frontend.yaml

      - name: Commit and push manifest changes
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add infrastructure/k3s/backend.yaml infrastructure/k3s/frontend.yaml
          git commit -m "chore(k8s): bump images to ${GITHUB_SHA} [skip ci]"
          git push

      - name: Telegram notify
        if: always()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            Job: update-k8s-manifests
            Status: ${{ job.status }}
            Ref: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
