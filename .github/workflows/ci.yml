name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-prepare:
    name: Backend - Prepare
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get cache key
        id: cache-key
        run: echo "key=${{ runner.os }}-backend-${{ hashFiles('server/pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: server/pnpm-lock.yaml
      
      - name: Cache node_modules
        uses: actions/cache@v3
        id: cache-node-modules
        with:
          path: server/node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-backend-
      
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: ./server
        run: pnpm install

  backend-test:
    name: Backend - Test
    needs: backend-prepare
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: server/node_modules
          key: ${{ needs.backend-prepare.outputs.cache-key }}
          fail-on-cache-miss: true
      
      - name: Run lint
        working-directory: ./server
        run: pnpm lint
      
      - name: Run migration
        working-directory: ./server
        run: pnpm typeorm:migrate
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: test_db

      - name: Run tests with coverage
        working-directory: ./server
        run: pnpm test:cov
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: test_db
      
      - name: Run E2E tests
        working-directory: ./server
        run: pnpm test:e2e
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_NAME: test_db
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: server/coverage
          if-no-files-found: warn

  backend-build:
    name: Backend - Build
    needs: backend-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: server/node_modules
          key: ${{ needs.backend-prepare.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Add pnpm to PATH
        run: echo "${{ github.workspace }}/server/node_modules/.bin" >> $GITHUB_PATH
      
      - name: Build project
        working-directory: ./server
        run: pnpm build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: server/dist
          if-no-files-found: error

  # Frontend jobs
  frontend-prepare:
    name: Frontend - Prepare
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get cache key
        id: cache-key
        run: echo "key=${{ runner.os }}-frontend-${{ hashFiles('client/package-lock.json') }}" >> $GITHUB_OUTPUT
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json
      
      - name: Cache node_modules
        uses: actions/cache@v3
        id: cache-node-modules
        with:
          path: client/node_modules
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-frontend-
      
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: ./client
        run: npm ci

  frontend-test:
    name: Frontend - Test
    needs: frontend-prepare
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: client/node_modules
          key: ${{ needs.frontend-prepare.outputs.cache-key }}
          fail-on-cache-miss: true
      
      - name: Run lint
        working-directory: ./client
        run: npm run lint
      
      - name: Type check
        working-directory: ./client
        run: npx tsc --noEmit
      
      - name: Run tests
        working-directory: ./client
        run: npm test

  frontend-build:
    name: Frontend - Build
    needs: frontend-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: client/node_modules
          key: ${{ needs.frontend-prepare.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Add npm to PATH
        run: echo "${{ github.workspace }}/client/node_modules/.bin" >> $GITHUB_PATH
      
      - name: Build project
        working-directory: ./client
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: client/.next
          if-no-files-found: error