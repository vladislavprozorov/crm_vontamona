version: "3.9"

services:
  # SonarQube Database
  sonarqube-db:
    container_name: sonarqube-postgres
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 10

  # SonarQube (self-hosted)
  sonarqube:
    container_name: sonarqube
    image: sonarqube:community
    restart: always
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - crm-network

  # PostgreSQL Database
  postgres:
    container_name: crm-postgres
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-nestjs-db}
      - POSTGRES_USER=${POSTGRES_USER:-root}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-123456}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    container_name: crm-backend
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${POSTGRES_USER:-root}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-123456}
      - DB_NAME=${POSTGRES_DB:-nestjs-db}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crm-network

  # Frontend Service
  frontend:
    container_name: crm-frontend
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: always
    environment:
      - INTERNAL_API_URL=http://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - crm-network

volumes:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgres_data:

networks:
  crm-network:
    driver: bridge
