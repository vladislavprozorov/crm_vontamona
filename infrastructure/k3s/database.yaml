---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: database
  ports:
    - port: 5433
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
      - name: postgres
        image: postgres:15
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: app-secrets
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-pvc
